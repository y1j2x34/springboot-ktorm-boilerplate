services:
  # MariaDB Database - Data storage for Spring Boot application
  mariadb:
    image: mariadb:11.2
    container_name: mariadb-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  flyway:
    image: flyway/flyway:10.17.3
    container_name: flyway-migrator
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}
      FLYWAY_USER: ${DB_USER}
      FLYWAY_PASSWORD: ${DB_PASSWORD}
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_BASELINE_VERSION: "0"
      FLYWAY_CONNECT_RETRIES: "30"
    volumes:
      - ./init:/flyway/source:ro
    entrypoint:
      - /bin/sh
      - -c
      - 'mkdir -p /flyway/sql && rm -f /flyway/sql/*.sql && for file in /flyway/source/*.sql; do name="$$(basename "$$file")"; cp "$$file" "/flyway/sql/R__$$name"; done && exec flyway "$$@"'
      - --
    command:
      - migrate
    networks:
      - app-network
    restart: "no"

volumes:
  mariadb-data:
    driver: local

networks:
  app-network:
    driver: bridge


